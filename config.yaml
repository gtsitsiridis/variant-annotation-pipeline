# variant_annotation — example config. Copy to config.local.yaml and edit paths.
# Heavy reference data lives on disk; only paths are tracked here.

# ── Input: a generic unique-variant VCF (dataset-agnostic) ───────────────────────────
# bgzipped + tabix-indexed, ID = chrom_start_ref_alt (carried as VEP Uploaded_variation).
# e.g. the gtex-benchmark variants module: output/variants/variants.vcf.gz
input_vcf: /data/nasif12/home_if12/tsi/projects/gtex-benchmark/output/variants/variants.vcf.gz

# Centralized output, namespaced per the consuming project's convention. Per-tool
# subdirs are created under here: vcf/ vep/ nmd/ absplice/ ref/ logs/ + annotations.parquet.
output_dir: /data/nasif12/home_if12/tsi/projects/gtex-benchmark/output/variant_annotation

# Optional chromosome filter applied BEFORE chunking (VEP is scattered over fixed-size
# variant chunks, not per chromosome — see vep.variants_per_chunk). Empty list / unset =
# annotate the whole input VCF; restrict here for a subset run (e.g. [chr21] for a smoke).
chromosomes: [chr1, chr2, chr3, chr4, chr5, chr6, chr7, chr8, chr9, chr10, chr11, chr12,
              chr13, chr14, chr15, chr16, chr17, chr18, chr19, chr20, chr21, chr22, chrX]

# ── Reference (match the consumer's gene namespace; gtex-benchmark = gencode v34) ─────
fasta: /s/genomes/Gencode/Gencode_human/release_34/GRCh38.primary_assembly.genome.fa
gtf:   /s/genomes/Gencode/Gencode_human/release_34/gencode.v34.annotation.gtf.gz
assembly: GRCh38

# ── Ensembl VEP ──────────────────────────────────────────────────────────────────────
# Gene namespace is pinned to the config `gtf` via VEP `--gtf` (custom annotation) so it
# matches the consumer exactly (gtex-benchmark = gencode v34) — NOT a prebuilt cache,
# whose Ensembl release wouldn't match gencode v34. The `prepare_gtf` rule sorts + bgzips
# + tabixes the GTF for VEP.
vep:
  plugin_dir: /path/to/ensembl-vep/Plugins    # cloned Ensembl/VEP_plugins
  fork: 8
  variants_per_chunk: 500000                   # VEP scatter granularity (1 Slurm job / chunk)

# ── VEP plugin reference data (download separately; see README) ───────────────────────
plugin_data:
  cadd_snv:      /path/to/cadd/whole_genome_SNVs.tsv.gz
  cadd_indel:    /path/to/cadd/gnomad.genomes.r3.0.indel.tsv.gz
  spliceai_snv:  /path/to/spliceAI/spliceai_scores.raw.snv.hg38.vcf.gz
  spliceai_indel: /path/to/spliceAI/spliceai_scores.raw.indel.hg38.vcf.gz
  primateai:     /path/to/primateAI/PrimateAI_scores_v0.2_GRCh38_sorted.tsv.bgz
  alphamissense: /path/to/AlphaMissense/AlphaMissense_hg38.tsv.gz
  # (Condel/SIFT/PolyPhen are cache-only → not available in --gtf mode.)
  # LOFTEE (https://github.com/konradjk/loftee, GRCh38 branch)
  loftee_path:            /path/to/loftee
  loftee_human_ancestor:  /path/to/loftee_data/human_ancestor.fa.gz
  loftee_conservation:    /path/to/loftee_data/loftee.sql
  loftee_gerp:            /path/to/loftee_data/gerp_conservation_scores.homo_sapiens.GRCh38.bw

# ── NMD-Scanner (gagneurlab/NMD-Scanner) — NMD escape prediction for PTCs ─────────────
# Uses the config `gtf` + `fasta`. Installed via pip (envs/nmd.yaml). Refines pLoF: a
# stop_gained / frameshift that ESCAPES NMD behaves very differently from one that triggers it.
nmd:
  enabled: true
  reassign_exons: false   # set true for hg19 exon numbering

# ── AbSplice (gagneurlab/absplice) ───────────────────────────────────────────────────
# Running AbSplice from scratch (per-tissue SpliceMaps + SpliceAI + GPU) is out of scope;
# instead point `result` at a *precomputed* AbSplice2 result — a directory of per-gene
# `*_max_preds.parquet` datasets. SNV-only; `AbSplice_DNA_max` / `AbSplice2_max` (max over
# the 49 GTEx tissues) are joined per (variant, gene). Indels get no score.
absplice:
  enabled: true
  result: /path/to/absplice/snv_avsplice2_all_max_preds/hg38/model_XX  # per-gene *_max_preds.parquet dir
